<!DOCTYPE html>
<html>
<head>
  <title>Account Security</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#020617;
  color:white;
  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* TITLE */

.title{
  font-size:32px;
  margin-bottom:30px;
}

/* GRID */

.grid{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */

.card{
  width:450px;
  background:#0f172a;
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);

  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* HEADING */

.card h2{
  margin-bottom:20px;
  text-align:center;
}

/* INPUT */

.input-box{
  margin-bottom:18px;
}

.input-box label{
  display:block;
  margin-bottom:7px;
  color:#cbd5e1;
}

.input-box input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  font-size:15px;
}

/* BUTTON */

.btn{
  width:100%;
  background:#38bdf8;
  color:black;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#0ea5e9;
  transform:scale(1.02);
}

/* BACK */

.back{
  margin-top:25px;
  text-decoration:none;
  color:#38bdf8;
  font-size:15px;
}

</style>
</head>

<body>

<h1 class="title">🛡 Account Security</h1>

<div class="grid">

  <div class="card">

    <h2>🔑 Change Password</h2>

    <div class="input-box">
      <label>Old Password</label>
      <input type="password">
    </div>

    <div class="input-box">
      <label>New Password</label>
      <input type="password">
    </div>

    <button class="btn">
      Update Password
    </button>

  </div>

</div>

<a href="/settings" class="back">
  ⬅ Back to Settings
</a>

</body>
</html>
