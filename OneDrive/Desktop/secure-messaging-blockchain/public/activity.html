<!DOCTYPE html>
<html>
<head>
  <title>Activity Log</title>

  <style>

    body{
      margin:0;
      font-family:Segoe UI;
      background:#0f172a;
      color:white;
    }

    .navbar{
      background:#020617;
      padding:15px 25px;
      display:flex;
      justify-content:space-between;
    }

    .navbar a{
      color:white;
      text-decoration:none;
      margin-left:15px;
    }

    .container{
      padding:30px;
    }

    h2{
      margin-bottom:20px;
    }

    .card{
      background:#1e293b;
      padding:15px;
      margin-bottom:15px;
      border-radius:12px;
      border-left:5px solid #38bdf8;
    }

    .user{
      font-weight:bold;
      color:#38bdf8;
    }

    .time{
      font-size:12px;
      color:#94a3b8;
      margin-top:5px;
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div>📜 Activity Log</div>
    <div>
      <a href="/dashboard">Dashboard</a>
      <a href="/chat">Chat</a>
      <a href="/logout">Logout</a>
    </div>
  </div>

  <div class="container">

    <h2>🔐 User Activity History</h2>

    <div id="logBox"></div>

  </div>

<script>

async function loadActivity(){

  const res = await fetch("/get-activity");
  const data = await res.json();

  const box = document.getElementById("logBox");
  box.innerHTML = "";

  data.reverse().forEach(a => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="user">👤 ${a.user}</div>
      <div>📝 ${a.action}</div>
      <div class="time">⏰ ${new Date(a.time).toLocaleString()}</div>
    `;

    box.appendChild(div);

  });

}

loadActivity();

</script>

</body>
</html>
