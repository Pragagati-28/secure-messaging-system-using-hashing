<!DOCTYPE html>
<html>
<head>
<title>Verification Center</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#020617;
  color:white;
}

.navbar{
  background:#0f172a;
  padding:18px 35px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:18px;
}

.container{
  padding:35px;
}

.title{
  text-align:center;
  margin-bottom:35px;
}

.title h1{
  font-size:34px;
}

.title p{
  color:#94a3b8;
}

#verifyBox{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#0f172a;
  padding:22px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);
}

.safe{
  border-left:6px solid #22c55e;
}

.tampered{
  border-left:6px solid #ef4444;
}

.status{
  font-weight:600;
  margin-top:12px;
}

.safe-text{
  color:#22c55e;
}

.tampered-text{
  color:#ef4444;
}

.msg{
  margin-top:12px;
  font-size:17px;
}

.meta{
  color:#94a3b8;
  margin-top:8px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="navbar">

  <div>🛡 Verification Center</div>

  <div>
    <a href="/dashboard">Dashboard</a>
    <a href="/tamper">Tamper</a>
    <a href="/logout">Logout</a>
  </div>

</div>

<div class="container">

  <div class="title">

    <h1>🔐 Message Integrity Verification</h1>

    <p>
      SHA-256 hash based tamper detection system
    </p>

  </div>

  <div id="verifyBox"></div>

</div>

<script>

async function loadVerification(){

  const res = await fetch("/verify-messages");

  const data = await res.json();

  const box = document.getElementById("verifyBox");

  box.innerHTML = "";

  data.forEach(msg => {

    const div = document.createElement("div");

    div.className =
      msg.verified
      ? "card safe"
      : "card tampered";

    div.innerHTML = `

      <div class="msg">
        💬 ${msg.content}
      </div>

      <div class="meta">
        👤 ${msg.sender}
      </div>

      <div class="meta">
        📩 ${msg.receiver}
      </div>

      <div class="meta">
        ⏰ ${new Date(msg.createdAt).toLocaleString()}
      </div>

      <div class="
        status
        ${msg.verified ? 'safe-text' : 'tampered-text'}
      ">

        ${
          msg.verified
          ? '✅ VERIFIED'
          : '❌ TAMPER DETECTED'
        }

      </div>

    `;

    box.appendChild(div);

  });

}

loadVerification();

</script>

</body>
</html>
